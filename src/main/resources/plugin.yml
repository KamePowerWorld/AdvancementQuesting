name: AdvancementQuesting
version: '1.0-SNAPSHOT'
main: com.kamesuta.advquesting.AdvancementQuesting
api-version: '1.21'
authors: [ Kamesuta ]

# サーバー起動時に Maven Central から自動DLされる
libraries:
  - org.xerial:sqlite-jdbc:${sqlite-jdbc.version}

commands:
  quest:
    description: AdvancementQuesting プレイヤー用コマンド
    usage: /quest [code|progress|claim <id>]
    permission: aq.player
  quest_edit:
    description: AdvancementQuesting 編集・管理コマンド
    usage: /quest_edit <complete|uncomplete> <player|@a> <id>
    permission: aq.editor

permissions:
  aq.player:
    description: クエストの閲覧・プレイ権限 (/quest コマンド)
    default: true
  aq.editor:
    description: Web エディタでの編集権限・/quest_edit コマンド
    default: op
